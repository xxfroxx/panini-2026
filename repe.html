<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repetidas Panini World Cup 2026</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#f4f6f8;color:#111827}
.container{max-width:1100px;margin:auto;padding:18px}
h1{font-size:clamp(28px,5vw,42px);margin:0 0 8px}
.subtitle{color:#6b7280;margin:0 0 18px}
.actions{display:grid;grid-template-columns:1fr;gap:10px;margin:16px 0}
.btn{display:inline-block;padding:12px 16px;border-radius:12px;background:#2563eb;color:white;text-decoration:none;font-weight:800;border:0;cursor:pointer;font-size:15px}
.btn.dark{background:#111827}
.status{background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;padding:12px;border-radius:12px;margin:16px 0;font-size:14px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}
.card{background:white;border:1px solid #e5e7eb;border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.card span{display:block;color:#6b7280;font-size:14px;margin-bottom:8px}
.card strong{display:block;font-size:34px;line-height:1}
.progress-card{background:white;border:1px solid #e5e7eb;border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:24px}
.progress-head{display:flex;justify-content:space-between;font-weight:800;margin-bottom:10px}
.progress-bar{height:24px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:#16a34a;transition:width .4s ease}
.search{width:100%;padding:13px;border:1px solid #d1d5db;border-radius:12px;font-size:16px;background:white;margin:0 0 14px}
.table-wrap{overflow-x:auto;background:white;border:1px solid #e5e7eb;border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
table{width:100%;min-width:720px;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid #e5e7eb;text-align:left;font-size:14px}
th{background:#111827;color:white}
.id-link{color:#2563eb;font-weight:900;text-decoration:none}
.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0}
.list{display:grid;gap:12px}
.sticker-card{background:white;border:1px solid #e5e7eb;border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);scroll-margin-top:14px}
.sticker-id{display:inline-block;background:#111827;color:white;border-radius:999px;padding:6px 11px;font-weight:900;font-size:16px;margin-bottom:10px}
.sticker-name{font-size:20px;font-weight:900;margin-bottom:6px}
.sticker-context{color:#6b7280;margin-bottom:10px;font-size:16px}
.available{display:inline-block;background:#dcfce7;color:#166534;border-radius:999px;padding:7px 10px;font-weight:900;font-size:14px}
.empty{padding:18px;background:white;border-radius:18px;border:1px solid #e5e7eb;color:#6b7280}
footer{color:#6b7280;font-size:13px;margin-top:26px}
@media(max-width:760px){.cards{grid-template-columns:repeat(2,1fr)}.btn{text-align:center;width:100%}}
@media(max-width:520px){.summary{grid-template-columns:1fr}.cards{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="container">
  <h1>Mis repetidas Panini World Cup 2026</h1>
  <p class="subtitle">Lista pública de cromos disponibles para intercambio.</p>

  <div id="status" class="status">Cargando repetidas desde Google Sheets...</div>

  <section class="summary">
    <div class="card"><span>Cromos diferentes repetidos</span><strong id="duplicateItems">-</strong></div>
    <div class="card"><span>Total disponibles</span><strong id="totalDuplicates">-</strong></div>
  </section>

  <div class="actions">
    <button class="btn" id="copyButton">Copiar lista</button>
  </div>

  <input id="searchInput" class="search" type="text" placeholder="Buscar por ID, selección o nombre...">

  <main id="list" class="list">
    <div class="empty">Cargando...</div>
  </main>

  <footer>Esta lista se actualiza cuando se actualiza el Google Sheet.</footer>
</div>

<script>
let duplicates=[];

function formatDate(value){
  if(!value)return "-";
  return new Date(value).toLocaleString("es-ES",{dateStyle:"medium",timeStyle:"short"});
}
function escapeHTML(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function renderPaniniData(data){
  duplicates=data.duplicatesList||[];
  document.getElementById("status").textContent="Última actualización: "+formatDate(data.updatedAt);
  document.getElementById("duplicateItems").textContent=data.summary.duplicateItems;
  document.getElementById("totalDuplicates").textContent=data.summary.totalDuplicates;
  renderList(duplicates);
  if(window.location.hash){
    setTimeout(()=>{
      const target=document.querySelector(window.location.hash);
      if(target) target.scrollIntoView({behavior:"smooth",block:"start"});
    },300);
  }
}
function renderList(items){
  const list=document.getElementById("list");
  list.innerHTML="";
  if(items.length===0){
    list.innerHTML="<div class='empty'>Todavía no hay cromos repetidos disponibles.</div>";
    return;
  }
  items.forEach(item=>{
    const card=document.createElement("article");
    card.className="sticker-card";
    card.id=item.id;
    card.innerHTML=`
      <div class="sticker-id">${escapeHTML(item.id)}</div>
      <div class="sticker-name">${escapeHTML(item.name||"Sin nombre")}</div>
      <div class="sticker-context">${escapeHTML(item.context||"")}</div>
      <div class="available">Disponible: ${item.availableToTrade}</div>`;
    list.appendChild(card);
  });
}
function buildCopyText(){
  if(!duplicates.length) return "No tengo cromos repetidos disponibles por ahora.";
  const lines=duplicates.map(item=>`${item.id} - ${item.name||""} - ${item.context||""} - Disponible: ${item.availableToTrade}`);
  return "Mis repetidas Panini World Cup 2026:\n"+lines.join("\n");
}
async function copyList(){
  const text=buildCopyText();
  try{
    await navigator.clipboard.writeText(text);
    document.getElementById("copyButton").textContent="Lista copiada";
    setTimeout(()=>document.getElementById("copyButton").textContent="Copiar lista",1800);
  }catch(error){
    alert(text);
  }
}
document.getElementById("copyButton").addEventListener("click",copyList);
document.getElementById("searchInput").addEventListener("input",function(e){
  const search=e.target.value.toLowerCase().trim();
  const filtered=duplicates.filter(item=>
    String(item.id).toLowerCase().includes(search)||
    String(item.context).toLowerCase().includes(search)||
    String(item.name).toLowerCase().includes(search)
  );
  renderList(filtered);
});
</script>
<script src="https://script.google.com/macros/s/AKfycbw_Umg50C_eKHxPPjzTcGXor4mWLUMmrIRb37np7TfoLemyXZdvFNiQjwqNrNQZ-5ebdw/exec?view=repe&callback=renderPaniniData"></script>
</body>
</html>
