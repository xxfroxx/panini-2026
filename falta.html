<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Faltantes Panini World Cup 2026</title>
<style>
:root{
  --bg:#f4f6f8;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --border:#e5e7eb;
  --blue:#2563eb;
  --dark:#111827;
  --green:#16a34a;
  --green-bg:#dcfce7;
  --green-text:#166534;
  --red-bg:#fee2e2;
  --red-text:#991b1b;
  --orange-bg:#fff7ed;
  --orange-border:#fed7aa;
  --orange-text:#9a3412;
}
*{box-sizing:border-box}
body{margin:0;font-family:Arial,sans-serif;background:var(--bg);color:var(--text)}
.container{max-width:1100px;margin:auto;padding:18px}
.container-narrow{max-width:820px;margin:auto;padding:16px}
h1{font-size:clamp(28px,5vw,42px);line-height:1.08;margin:0 0 8px}
.subtitle{color:var(--muted);margin:0 0 18px;font-size:16px}
.actions{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:16px 0}
.actions.one{grid-template-columns:1fr}
.btn{display:inline-block;padding:13px 16px;border-radius:12px;background:var(--blue);color:white;text-decoration:none;font-weight:800;border:0;cursor:pointer;font-size:15px;text-align:center}
.btn.dark{background:var(--dark)}
.status{background:var(--orange-bg);border:1px solid var(--orange-border);color:var(--orange-text);padding:12px;border-radius:12px;margin:16px 0;font-size:14px}
.cards{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:18px 0}
.card{background:white;border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
.card span{display:block;color:var(--muted);font-size:14px;margin-bottom:8px}
.card strong{display:block;font-size:34px;line-height:1}
.summary{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin:16px 0}
.progress-card{background:white;border:1px solid var(--border);border-radius:18px;padding:18px;box-shadow:0 2px 10px rgba(0,0,0,.06);margin-bottom:24px}
.progress-head{display:flex;justify-content:space-between;font-weight:800;margin-bottom:10px}
.progress-bar{height:24px;background:#e5e7eb;border-radius:999px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:var(--green);transition:width .4s ease}
.search{width:100%;padding:13px;border:1px solid #d1d5db;border-radius:12px;font-size:16px;background:white;margin:0 0 14px}
.table-wrap{overflow-x:auto;background:white;border:1px solid var(--border);border-radius:18px;box-shadow:0 2px 10px rgba(0,0,0,.06)}
table{width:100%;min-width:720px;border-collapse:collapse}
th,td{padding:12px;border-bottom:1px solid var(--border);text-align:left;font-size:14px;vertical-align:top}
th{background:var(--dark);color:white}
.id-link{color:var(--blue);font-weight:900;text-decoration:none}
.list{display:grid;gap:12px}
.sticker-card{background:white;border:1px solid var(--border);border-radius:18px;padding:16px;box-shadow:0 2px 10px rgba(0,0,0,.06);scroll-margin-top:14px}
.sticker-id{display:inline-block;background:var(--dark);color:white;border-radius:999px;padding:6px 11px;font-weight:900;font-size:16px;margin-bottom:10px}
.sticker-name{font-size:20px;font-weight:900;margin-bottom:6px}
.sticker-context{color:var(--muted);margin-bottom:10px;font-size:16px}
.badge{display:inline-block;border-radius:999px;padding:7px 10px;font-weight:900;font-size:14px}
.badge.available{background:var(--green-bg);color:var(--green-text)}
.badge.missing{background:var(--red-bg);color:var(--red-text)}
.empty{padding:18px;background:white;border-radius:18px;border:1px solid var(--border);color:var(--muted)}
footer{color:var(--muted);font-size:13px;margin-top:26px}
@media(max-width:760px){
  .cards{grid-template-columns:repeat(2,1fr)}
  .actions{grid-template-columns:1fr}
  .btn{width:100%}
}
@media(max-width:520px){
  .summary{grid-template-columns:1fr}
  .cards{grid-template-columns:1fr}
}
</style>
</head>
<body>
<div class="container-narrow">
  <h1>Mis faltantes Panini World Cup 2026</h1>
  <p class="subtitle">Lista pública de cromos que todavía estoy buscando.</p>

  <div id="status" class="status">Cargando faltantes desde Google Sheets...</div>

  <section class="summary">
    <div class="card"><span>Total faltantes</span><strong id="missingTotal">-</strong></div>
    <div class="card"><span>Lista</span><strong id="visibleTotal">-</strong></div>
  </section>

  <div class="actions">
    <button class="btn" id="copyShortButton">Copiar lista corta</button>
    <button class="btn dark" id="copyExtendedButton">Copiar lista extendida</button>
  </div>

  <input id="searchInput" class="search" type="text" placeholder="Buscar por ID, selección o nombre...">

  <main id="list" class="list">
    <div class="empty">Cargando...</div>
  </main>

  <footer>Esta lista se actualiza cuando se actualiza el Google Sheet.</footer>
</div>

<script>
let missingItems=[];

function formatDate(value){
  if(!value)return "-";
  return new Date(value).toLocaleString("es-ES",{dateStyle:"medium",timeStyle:"short"});
}
function escapeHTML(value){
  return String(value)
    .replaceAll("&","&amp;")
    .replaceAll("<","&lt;")
    .replaceAll(">","&gt;")
    .replaceAll('"',"&quot;")
    .replaceAll("'","&#039;");
}

function renderPaniniData(data){
  missingItems=data.missingList||[];
  document.getElementById("status").textContent="Última actualización: "+formatDate(data.updatedAt);
  document.getElementById("missingTotal").textContent=data.summary.missing;
  document.getElementById("visibleTotal").textContent=missingItems.length;
  renderList(missingItems);
}
function renderList(items){
  const list=document.getElementById("list");
  list.innerHTML="";
  document.getElementById("visibleTotal").textContent=items.length;
  if(items.length===0){
    list.innerHTML="<div class='empty'>No hay cromos faltantes en esta vista.</div>";
    return;
  }
  items.forEach(item=>{
    const card=document.createElement("article");
    card.className="sticker-card";
    card.id=item.id;
    card.innerHTML=`
      <div class="sticker-id">${escapeHTML(item.id)}</div>
      <div class="sticker-name">${escapeHTML(item.name||"Sin nombre")}</div>
      <div class="sticker-context">${escapeHTML(item.context||"")}</div>
      <div class="badge missing">Falta</div>`;
    list.appendChild(card);
  });
}
function buildShortMissingText(){
  if(!missingItems.length)return "No tengo cromos faltantes por ahora.";
  const groups={};
  const extras=[];

  missingItems.forEach(item=>{
    const id=String(item.id||"").trim().toUpperCase();
    if(!id)return;

    if(id==="00"){
      extras.push("00");
      return;
    }

    const match=id.match(/^([A-Z]+)(\d+)$/);
    if(!match){
      extras.push(id);
      return;
    }

    const prefix=match[1];
    const number=match[2];

    if(!groups[prefix]){
      groups[prefix]=[];
    }

    groups[prefix].push(number);
  });

  const lines=Object.keys(groups)
    .sort()
    .map(prefix=>{
      const numbers=groups[prefix]
        .slice()
        .sort((a,b)=>Number(a)-Number(b));

      if(numbers.length===0)return "";

      return prefix+numbers[0]+(
        numbers.length>1
          ? ","+numbers.slice(1).join(",")
          : ""
      );
    })
    .filter(Boolean);

  extras.sort((a,b)=>a.localeCompare(b,"es",{numeric:true})).forEach(item=>lines.push(item));

  return "Mis faltantes Panini World Cup 2026:\n\n"+lines.join("\n");
}

function buildExtendedMissingText(){
  if(!missingItems.length)return "No tengo cromos faltantes por ahora.";
  const groups={};

  missingItems.forEach(item=>{
    const id=String(item.id||"").trim();
    if(!id)return;

    const groupName=String(item.context||item.section||"Otros").trim()||"Otros";
    const name=String(item.name||"").trim();

    if(!groups[groupName]){
      groups[groupName]=[];
    }

    groups[groupName].push({id,name});
  });

  const lines=["Mis faltantes Panini World Cup 2026:",""];

  Object.keys(groups)
    .sort((a,b)=>a.localeCompare(b,"es",{numeric:true}))
    .forEach(groupName=>{
      lines.push(groupName);

      groups[groupName]
        .slice()
        .sort((a,b)=>a.id.localeCompare(b.id,"es",{numeric:true}))
        .forEach(item=>{
          lines.push(item.name?`${item.id} - ${item.name}`:item.id);
        });

      lines.push("");
    });

  return lines.join("\n").trim();
}

async function copyText(text,buttonId,originalLabel){
  try{
    await navigator.clipboard.writeText(text);
    document.getElementById(buttonId).textContent="Lista copiada";
    setTimeout(()=>document.getElementById(buttonId).textContent=originalLabel,1800);
  }catch(error){
    alert(text);
  }
}
function copyShortList(){
  return copyText(buildShortMissingText(),"copyShortButton","Copiar lista corta");
}
function copyExtendedList(){
  return copyText(buildExtendedMissingText(),"copyExtendedButton","Copiar lista extendida");
}
document.getElementById("copyShortButton").addEventListener("click",copyShortList);
document.getElementById("copyExtendedButton").addEventListener("click",copyExtendedList);
document.getElementById("searchInput").addEventListener("input",function(e){
  const search=e.target.value.toLowerCase().trim();
  const filtered=missingItems.filter(item=>
    String(item.id).toLowerCase().includes(search)||
    String(item.context).toLowerCase().includes(search)||
    String(item.name).toLowerCase().includes(search)
  );
  renderList(filtered);
});
</script>
<script src="config.js"></script>
<script>
  function loadPaniniData(view) {
    const script = document.createElement("script");
    script.src = window.PANINI_CONFIG.APPS_SCRIPT_URL
      + "?view=" + encodeURIComponent(view)
      + "&callback=renderPaniniData";
    document.body.appendChild(script);
  }

  loadPaniniData("missing");
</script>
</body>
</html>
